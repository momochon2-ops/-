<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calc 2030</title>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #000d2e;
      font-family: 'Caveat', cursive;
      position: relative;
    }

    /* ============================================================
       ANIMATED WAVE BACKGROUND
       複数のブロブが独立して動き、重なって波状の光を作る
    ============================================================ */
    .bg {
      position: fixed;
      inset: 0;
      overflow: hidden;
      z-index: 0;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      mix-blend-mode: screen;
      will-change: transform;
    }

    .blob-1 {
      width: 70vw;
      height: 70vw;
      background: radial-gradient(circle, rgba(0, 80, 255, 0.7), transparent 70%);
      top: -15vw;
      left: -15vw;
      animation: floatA 11s ease-in-out infinite alternate;
    }

    .blob-2 {
      width: 60vw;
      height: 90vw;
      background: radial-gradient(circle, rgba(0, 200, 255, 0.5), transparent 70%);
      top: 20vh;
      right: -10vw;
      animation: floatB 14s ease-in-out infinite alternate;
    }

    .blob-3 {
      width: 80vw;
      height: 50vw;
      background: radial-gradient(circle, rgba(30, 0, 180, 0.65), transparent 70%);
      bottom: -10vw;
      left: 10vw;
      animation: floatC 9s ease-in-out infinite alternate;
    }

    .blob-4 {
      width: 45vw;
      height: 45vw;
      background: radial-gradient(circle, rgba(0, 255, 220, 0.35), transparent 70%);
      top: 50vh;
      left: 30vw;
      animation: floatD 16s ease-in-out infinite alternate;
    }

    .blob-5 {
      width: 50vw;
      height: 70vw;
      background: radial-gradient(circle, rgba(100, 80, 255, 0.4), transparent 70%);
      bottom: 0;
      right: 5vw;
      animation: floatE 12s ease-in-out infinite alternate;
    }

    @keyframes floatA {
      0%   { transform: translate(0, 0) scale(1); }
      33%  { transform: translate(15vw, 20vh) scale(1.1); }
      66%  { transform: translate(5vw, 50vh) scale(0.9); }
      100% { transform: translate(20vw, 30vh) scale(1.05); }
    }
    @keyframes floatB {
      0%   { transform: translate(0, 0) scale(1); }
      50%  { transform: translate(-20vw, 30vh) scale(1.2); }
      100% { transform: translate(-10vw, -20vh) scale(0.85); }
    }
    @keyframes floatC {
      0%   { transform: translate(0, 0) rotate(0deg); }
      50%  { transform: translate(10vw, -30vh) rotate(20deg) scale(1.1); }
      100% { transform: translate(-15vw, -10vh) rotate(-10deg) scale(0.95); }
    }
    @keyframes floatD {
      0%   { transform: translate(0, 0) scale(1); }
      40%  { transform: translate(-20vw, -30vh) scale(1.3); }
      100% { transform: translate(15vw, 20vh) scale(0.8); }
    }
    @keyframes floatE {
      0%   { transform: translate(0, 0) scale(1); }
      60%  { transform: translate(-15vw, -40vh) scale(1.2); }
      100% { transform: translate(10vw, -10vh) scale(0.9); }
    }

    /* ============================================================
       CALCULATOR DEVICE
    ============================================================ */
    .device {
      position: relative;
      z-index: 10;
      width: min(320px, 92vw);
      padding: 28px 20px 32px;
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(28px) saturate(160%);
      -webkit-backdrop-filter: blur(28px) saturate(160%);
      border-radius: 44px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      box-shadow:
        0 0 0 0.5px rgba(255,255,255,0.08) inset,
        0 30px 80px rgba(0, 0, 0, 0.4),
        0 0 60px rgba(0, 120, 255, 0.08);
      animation: fadeIn 1.8s ease forwards;
    }

    @keyframes fadeIn {
      0%   { opacity: 0; transform: scale(0.96) translateY(8px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* ============================================================
       DISPLAY
    ============================================================ */
    .display-area {
      padding: 8px 12px 18px;
      min-height: 110px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: flex-end;
    }

    .expression {
      font-size: 18px;
      font-weight: 400;
      color: rgba(180, 220, 255, 0.45);
      min-height: 26px;
      text-align: right;
      letter-spacing: 1px;
      transition: opacity 0.3s;
    }

    .display {
      font-size: 62px;
      font-weight: 700;
      color: rgba(230, 245, 255, 0.9);
      text-align: right;
      line-height: 1;
      letter-spacing: -1px;
      text-shadow:
        0 0 30px rgba(140, 210, 255, 0.7),
        0 0 60px rgba(100, 180, 255, 0.3);
      word-break: break-all;
      transition: text-shadow 0.15s;
    }

    .display.flash {
      text-shadow:
        0 0 40px rgba(140, 210, 255, 1),
        0 0 80px rgba(100, 180, 255, 0.6);
    }

    /* ============================================================
       DIVIDER LINE
    ============================================================ */
    .divider {
      height: 0.5px;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.2), transparent);
      margin: 0 8px 20px;
    }

    /* ============================================================
       BUTTONS
    ============================================================ */
    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      height: 62px;
      border: none;
      border-radius: 50%;
      font-family: 'Caveat', cursive;
      font-size: 26px;
      font-weight: 600;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: rgba(230, 245, 255, 0.82);
      letter-spacing: 0.5px;
      transition:
        background 0.18s,
        transform 0.1s,
        box-shadow 0.18s,
        color 0.18s;
      outline: none;
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    button::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.18), transparent 60%);
      pointer-events: none;
    }

    button:hover {
      background: rgba(255, 255, 255, 0.13);
      box-shadow: 0 0 20px rgba(160, 220, 255, 0.15);
    }

    button:active {
      transform: scale(0.93);
      background: rgba(255, 255, 255, 0.18);
    }

    /* 演算子 */
    .btn-operator {
      color: rgba(120, 220, 255, 0.9);
      border-color: rgba(100, 200, 255, 0.22);
      background: rgba(80, 180, 255, 0.08);
      font-size: 30px;
      text-shadow: 0 0 12px rgba(100, 210, 255, 0.5);
    }
    .btn-operator:hover {
      background: rgba(80, 180, 255, 0.16);
      box-shadow: 0 0 24px rgba(80, 200, 255, 0.2);
    }

    /* AC・補助 */
    .btn-misc {
      color: rgba(200, 225, 255, 0.7);
      font-size: 20px;
      background: rgba(255, 255, 255, 0.05);
    }

    /* ＝ボタン */
    .btn-equals {
      background: rgba(80, 160, 255, 0.22);
      border-color: rgba(120, 190, 255, 0.35);
      color: rgba(200, 235, 255, 0.95);
      text-shadow: 0 0 14px rgba(140, 210, 255, 0.7);
      box-shadow: 0 0 20px rgba(80, 160, 255, 0.15);
    }
    .btn-equals:hover {
      background: rgba(80, 160, 255, 0.32);
      box-shadow: 0 0 30px rgba(80, 160, 255, 0.3);
    }

    /* 0ボタン（横長） */
    .btn-zero {
      grid-column: span 2;
      border-radius: 40px;
      text-align: left;
      padding-left: 26px;
    }
  </style>
</head>
<body>

<!-- 波背景 -->
<div class="bg">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
  <div class="blob blob-4"></div>
  <div class="blob blob-5"></div>
</div>

<!-- 計算機 -->
<div class="device">
  <div class="display-area">
    <div class="expression" id="expression"></div>
    <div class="display" id="display">0</div>
  </div>

  <div class="divider"></div>

  <div class="buttons">
    <button class="btn-misc" onclick="clearAll()">AC</button>
    <button class="btn-misc" onclick="toggleSign()">+/−</button>
    <button class="btn-misc" onclick="percent()">%</button>
    <button class="btn-operator" onclick="setOperator('/')">÷</button>

    <button onclick="inputNumber('7')">7</button>
    <button onclick="inputNumber('8')">8</button>
    <button onclick="inputNumber('9')">9</button>
    <button class="btn-operator" onclick="setOperator('*')">×</button>

    <button onclick="inputNumber('4')">4</button>
    <button onclick="inputNumber('5')">5</button>
    <button onclick="inputNumber('6')">6</button>
    <button class="btn-operator" onclick="setOperator('-')">−</button>

    <button onclick="inputNumber('1')">1</button>
    <button onclick="inputNumber('2')">2</button>
    <button onclick="inputNumber('3')">3</button>
    <button class="btn-operator" onclick="setOperator('+')">+</button>

    <button class="btn-zero" onclick="inputNumber('0')">0</button>
    <button onclick="inputDecimal()">.</button>
    <button class="btn-equals" onclick="calculate()">=</button>
  </div>
</div>

<script>
  let currentInput = '0';
  let previousInput = '';
  let operator = null;
  let waitingForNext = false;

  const displayEl = document.getElementById('display');
  const expressionEl = document.getElementById('expression');

  function updateDisplay(value) {
    displayEl.textContent = value;
  }

  function updateExpression(text) {
    expressionEl.textContent = text;
  }

  function flashDisplay() {
    displayEl.classList.add('flash');
    setTimeout(() => displayEl.classList.remove('flash'), 200);
  }

  function inputNumber(num) {
    if (waitingForNext) {
      currentInput = num;
      waitingForNext = false;
    } else {
      if (currentInput.replace(/[.\-]/g, '').length >= 10) return;
      currentInput = currentInput === '0' ? num : currentInput + num;
    }
    updateDisplay(currentInput);
  }

  function inputDecimal() {
    if (waitingForNext) {
      currentInput = '0.';
      waitingForNext = false;
    } else if (!currentInput.includes('.')) {
      currentInput += '.';
    }
    updateDisplay(currentInput);
  }

  function opSymbol(op) {
    return { '+': '+', '-': '−', '*': '×', '/': '÷' }[op] || op;
  }

  function setOperator(op) {
    if (operator && !waitingForNext) calculate(true);
    previousInput = currentInput;
    operator = op;
    waitingForNext = true;
    updateExpression(previousInput + '  ' + opSymbol(op));
  }

  function calculate(chain) {
    if (!operator || waitingForNext) return;
    const prev = parseFloat(previousInput);
    const curr = parseFloat(currentInput);
    let result;
    switch (operator) {
      case '+': result = prev + curr; break;
      case '-': result = prev - curr; break;
      case '*': result = prev * curr; break;
      case '/':
        if (curr === 0) {
          updateDisplay('...');
          updateExpression('undefined');
          setTimeout(clearAll, 1200);
          return;
        }
        result = prev / curr;
        break;
    }
    if (!chain) {
      updateExpression(previousInput + '  ' + opSymbol(operator) + '  ' + currentInput + '  =');
    }
    currentInput = parseFloat(result.toFixed(10)).toString();
    operator = null;
    previousInput = '';
    waitingForNext = false;
    updateDisplay(currentInput);
    flashDisplay();
  }

  function clearAll() {
    currentInput = '0';
    previousInput = '';
    operator = null;
    waitingForNext = false;
    updateDisplay('0');
    updateExpression('');
  }

  function toggleSign() {
    if (currentInput !== '0') {
      currentInput = currentInput.startsWith('-')
        ? currentInput.slice(1)
        : '-' + currentInput;
      updateDisplay(currentInput);
    }
  }

  function percent() {
    currentInput = (parseFloat(currentInput) / 100).toString();
    updateDisplay(currentInput);
  }

  document.addEventListener('keydown', function(e) {
    if (e.key >= '0' && e.key <= '9') inputNumber(e.key);
    else if (e.key === '.') inputDecimal();
    else if (e.key === '+') setOperator('+');
    else if (e.key === '-') setOperator('-');
    else if (e.key === '*') setOperator('*');
    else if (e.key === '/') { e.preventDefault(); setOperator('/'); }
    else if (e.key === 'Enter' || e.key === '=') calculate();
    else if (e.key === 'Escape') clearAll();
    else if (e.key === '%') percent();
  });
</script>

</body>
</html>
